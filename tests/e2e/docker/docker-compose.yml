services:
  mysql:
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: dbcheck
      MYSQL_USER: checker
      MYSQL_PASSWORD: checkerpwd
      TZ: Asia/Shanghai
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpwd"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 20s

  os-target:
    build:
      context: ./os-target
    restart: unless-stopped
    hostname: os-target
    ports:
      - "12222:22"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22"]
      interval: 3s
      timeout: 3s
      retries: 10
